<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Калькулятор енергетичного балансу</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:35px;
    border-radius:16px;
    width:340px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-size:14px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#2f80ed;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f3f7ff;
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>Енергетичний баланс</h1>

<label>Вага (кг)</label>
<input id="weight" type="number">

<label>Зріст (см)</label>
<input id="height" type="number">

<label>Вік</label>
<input id="age" type="number">

<label>Стать</label>
<select id="sex">
<option value="f">Жінка</option>
<option value="m">Чоловік</option>
</select>

<label>Рівень активності</label>
<select id="activity">
<option value="1.2">Мінімальна</option>
<option value="1.375">Легка</option>
<option value="1.55">Середня</option>
<option value="1.725">Висока</option>
</select>

<button onclick="calculate()">Розрахувати</button>

<div class="result" id="result">
Тут з'явиться результат
</div>

</div>

<script>

function calculate(){

let w = Number(document.getElementById("weight").value)
let h = Number(document.getElementById("height").value)
let age = Number(document.getElementById("age").value)
let sex = document.getElementById("sex").value
let act = Number(document.getElementById("activity").value)

let s = sex === "m" ? 5 : -161

let bmr = 10*w + 6.25*h - 5*age + s
let tdee = bmr * act

let lose = tdee - 500
let gain = tdee + 300

document.getElementById("result").innerHTML = `
<b>BMR:</b> ${Math.round(bmr)} ккал<br><br>
<b>Добова потреба (TDEE):</b> ${Math.round(tdee)} ккал<br><br>
Для схуднення: ${Math.round(lose)} ккал<br>
Для підтримки: ${Math.round(tdee)} ккал<br>
Для набору: ${Math.round(gain)} ккал
`

}

</script>

</body>
</html>
